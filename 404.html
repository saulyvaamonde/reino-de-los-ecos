<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--fonts-->
      <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        body {
            background-image: url(imagenes/image-404.webp);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
             margin: 0;
        }

        section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            background-color: rgba(255, 255, 255, .90);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 35px 25px ;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px rgba(0, 0, 0, .25);
            animation: aparecer 1.5s ease;

        }


        .lumi {
            width: 250px;
            height: auto;
            animation: flotar 3s ease-in-out infinite;
        }

        h1 {
            font-size: 72px;
            margin: 10px 0;
        }

        p {
            font-weight: bold;
            font-size: 18px;
            line-height: 1.7;
        } 

        .btn {
            display: inline-block;
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease; 
            text-decoration: none;
            cursor: pointer;
           background-color: gray;
           color: black;
           font-weight: bold;
        }

        .btn:hover {
             background-color: rgb(39, 39, 39); /* Cambia a un tono más oscuro */
             box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
             cursor: pointer;
             color: white;
             transform: translateY(-3px);
        }

        .particulas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particulas span {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff6b5;
            border-radius: 50%;
            animation: subir 8s linear infinite;
            opacity: .7;
        }

        .particulas span:nth-child(1){left:15%;bottom:-20px;animation-delay:0s;}
        .particulas span:nth-child(2){left:30%;bottom:-30px;animation-delay:2s;}
        .particulas span:nth-child(3){left:50%;bottom:-20px;animation-delay:1s;}
        .particulas span:nth-child(4){left:70%;bottom:-30px;animation-delay:4s;}
        .particulas span:nth-child(5){left:82%;bottom:-15px;animation-delay:3s;}
        .particulas span:nth-child(6){left:92%;bottom:-25px;animation-delay:5s;}

        @keyframes subir {
            fron{
                transform: translateY(0);
                opacity: 0;
            }
            30%{
                opacity: 1;
            }
            to{
                transform: translateY(-900px);
                opacity: 0;
            }
        }

        @keyframes flotar {
            0%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-8px);
            }
            100%{
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    
    <section>
        <div class="container">
            <img src="imagenes/lumi.webp" alt="Lumi" class="lumi">
            <h1>404</h1>
            <p>Lumi parece haberse perdido... <br>
            Los senderos del Reino de Los Ecos cambian cuando nadie los recorre.
            </p><br>
            <a href="index.html" class="btn">Volver al Reino</a>
        </div>
        
    </section>

       <div class="particulas">
    
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

   </div>

</body>
</html>
