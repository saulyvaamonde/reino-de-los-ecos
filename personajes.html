<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Personajes | WhisperValley</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">


<style>

    
:root{

--verde:#8E9C74;

--verde2:#C8D1B6;

--beige:#F7F1E6;

--crema:#FDFBF8;

--marron:#5A4635;

}

body{

font-family:"Lora",serif;

background:#FDFBF8;

overflow-x:hidden;

}

/* HERO */

.hero-personajes{

position:relative;

min-height:100vh;

background:url("imagenes/portada2.webp");

background-size:cover;

background-position:center;

overflow:hidden;

display:flex;

flex-direction:column;

}

.overlay{

position:absolute;

inset:0;

background:rgba(255,250,242,.30);

backdrop-filter:blur(2px);

}

.hero-content{

position:relative;

z-index:20;

margin:auto;

text-align:center;

padding:120px 20px;

}

.hero-content h1{

font-family:"Cinzel",serif;

font-size:70px;

letter-spacing:4px;

color:#5A4635;

}

.hero-content p{

margin-top:20px;

font-size:22px;

color:#6A5B4B;

}

.decoracion{

margin:auto;

margin-top:30px;

width:160px;

height:2px;

background:#B4B28A;

position:relative;

}

.decoracion::before{

content:"❈";

position:absolute;

left:50%;

top:-14px;

transform:translateX(-50%);

color:#8E9C74;

font-size:22px;

}

/* NAVBAR */

.navbar{

z-index:30;

padding-top:25px;

}

.logo{

height:55px;

}

.nav-link{

font-family:"Cinzel";

margin:0 12px;

color:#5A4635!important;

font-size:15px;

transition:.4s;

}

.nav-link:hover{

color:#8E9C74!important;

}

.nav-link.active{

color:#8E9C74!important;

}

/* TITULO */

.titulo-seccion{

text-align:center;

margin-top:30px;

margin-bottom:50px;

}

.titulo-seccion h2{

font-family:"Cinzel";

letter-spacing:2px;

font-size:42px;

color:#5A4635;

}

@media(max-width:991px){

.hero-content h1{

font-size:52px;

}

.hero-content p{

font-size:18px;

}

}

@media(max-width:768px){

.hero-content{

padding-top:170px;

}

.hero-content h1{

font-size:42px;

}

.hero-content p{

font-size:16px;

}

.logo{

height:45px;

}

}

</style>
</head>

<body>

<header class="hero-personajes">

<div class="overlay"></div>

<div class="fog"></div>

<div class="lights"></div>

<div class="leaves"></div>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light">

<div class="container">

<a class="navbar-brand" href="index.html">

<img src="imagenes/simbolo.webp" class="logo">

</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse justify-content-center"
id="menu">

<ul class="navbar-nav">

<li class="nav-item">

<a class="nav-link" href="index.html">
Inicio
</a>

</li>

<li class="nav-item">

<a class="nav-link active">
Personajes
</a>

</li>

<li class="nav-item">

<a class="nav-link">
Historia
</a>

</li>

<li class="nav-item">

<a class="nav-link">
Lugares
</a>

</li>

<li class="nav-item">

<a class="nav-link">
Galería
</a>

</li>

</ul>

</div>

</div>

</nav>



<div class="hero-content">

<h1>PERSONAJES</h1>

<p>

Conoce a los habitantes del Reino de los Ecos

</p>

<div class="decoracion"></div>

</div>

</header>


<section class="container py-5">

<div class="titulo-seccion">

<h2>PROTAGONISTAS</h2>

</div>

</section>

</html>
